name: Build Sileo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sileo-release
  cancel-in-progress: true

jobs:
  sileo:
    name: Build arm64 + arm64e and publish sileo
    runs-on: macos-latest
    env:
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install bootstrap prerequisites
        run: |
          brew install wget gnu-tar zstd

      - name: Setup Procursus
        run: |
          set -euxo pipefail
          if [[ "$(uname -m)" == "arm64" ]]; then
            PROC_ARCH="arm64"
          else
            PROC_ARCH="amd64"
          fi
          BOOTSTRAP_URL="https://apt.procurs.us/bootstraps/big_sur/bootstrap-darwin-${PROC_ARCH}.tar.zst"
          wget "$BOOTSTRAP_URL" -O bootstrap-darwin.tar.zst
          sudo gtar --preserve-permissions -xkf ./bootstrap-darwin.tar.zst -C /
          echo "/opt/procursus/sbin:/opt/procursus/bin" >> "$GITHUB_PATH"
          PATH=/opt/procursus/sbin:/opt/procursus/bin:$PATH sudo /opt/procursus/bin/apt update
          sudo /opt/procursus/bin/apt install zstd apt-utils ldid xz-utils bzip2 lz4 -y --allow-downgrades -oDpkg::Options::=--force-confdef -oDpkg::Options::=--force-confnew

      - name: Build Sileo (iphoneos-arm64)
        run: |
          make clean package SILEO_PLATFORM=iphoneos-arm64

      - name: Collect arm64 deb
        run: |
          mkdir -p sileo-debs
          cp packages/*_iphoneos-arm64.deb sileo-debs/

      - name: Build Sileo (iphoneos-arm64e / roothide)
        run: |
          make clean package SILEO_PLATFORM=iphoneos-arm64e

      - name: Collect arm64e deb
        run: |
          cp packages/*_iphoneos-arm64e.deb sileo-debs/

      - name: Publish Sileo Release
        uses: ncipollo/release-action@v1
        with:
          tag: sileo
          name: Sileo
          body: |
            Automated sileo build.
            Commit: ${{ github.sha }}
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          artifacts: "sileo-debs/*.deb"
